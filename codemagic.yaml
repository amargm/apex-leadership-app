# ─────────────────────────────────────────────────────────────────────────────
# Required Codemagic variable groups (configure in CM web UI → Teams → Env vars):
#
#   keystore_credentials        (for signed release builds)
#     CM_KEYSTORE               base64-encoded .keystore file
#     CM_KEYSTORE_PASSWORD      keystore password
#     CM_KEY_ALIAS              key alias  (apex)
#     CM_KEY_PASSWORD           key password
#
#   firebase_credentials        (for google-services.json)
#     GOOGLE_SERVICES_JSON      base64-encoded google-services.json
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  # ── 1. Android Debug APK ────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      groups:
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.apex.leadership"
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Decode google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > google-services.json
          cp google-services.json android/app/google-services.json

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Restore gradle.properties
        script: cp android/gradle.properties.ci android/gradle.properties

      - name: Build debug APK
        script: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true

  # ── 2. Android Release AAB (Signed — Play Store) ───────────────────────────
  android-release:
    name: Android Release AAB (Signed)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      groups:
        - keystore_credentials
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.apex.leadership"

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Decode google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > google-services.json
          cp google-services.json android/app/google-services.json

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Restore gradle.properties
        script: |
          cp android/gradle.properties.ci android/gradle.properties
          printf '\nAPEX_STORE_PASSWORD=%s\n' "$CM_KEYSTORE_PASSWORD" >> android/gradle.properties
          printf 'APEX_KEY_PASSWORD=%s\n' "$CM_KEY_PASSWORD" >> android/gradle.properties

      - name: Decode keystore for signing
        script: |
          printf '%s' "$CM_KEYSTORE" | base64 --decode > apex-upload.keystore
          echo "Keystore decoded: $(wc -c < apex-upload.keystore) bytes"
          keytool -list -keystore apex-upload.keystore -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS" 2>&1 | head -5

      - name: Build signed release AAB
        script: |
          cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true

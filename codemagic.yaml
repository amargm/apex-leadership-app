# ─────────────────────────────────────────────────────────────────────────────
# Required Codemagic variable groups (configure in CM web UI → Teams → Env vars):
#
#   keystore_credentials        (for signed release builds)
#     CM_KEYSTORE               base64-encoded .keystore file
#     CM_KEYSTORE_PASSWORD      keystore password
#     CM_KEY_ALIAS              key alias  (apex)
#     CM_KEY_PASSWORD           key password
#
#   firebase_credentials        (for google-services.json)
#     GOOGLE_SERVICES_JSON      base64-encoded google-services.json
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  # ── 1. Android Debug APK ────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      groups:
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.apex.leadership"
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Decode google-services.json
        script: |
          echo -n "$GOOGLE_SERVICES_JSON" | tr -d ' \n\r' | base64 --decode > google-services.json
          cp google-services.json android/app/google-services.json

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build debug APK
        script: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true

  # ── 2. Android Release AAB (Signed — Play Store) ───────────────────────────
  android-release:
    name: Android Release AAB (Signed)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
      groups:
        - keystore_credentials
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.apex.leadership"

    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps

      - name: Decode google-services.json
        script: |
          echo -n "$GOOGLE_SERVICES_JSON" | tr -d ' \n\r' | base64 --decode > google-services.json
          cp google-services.json android/app/google-services.json

      - name: Set Android SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Inject signing passwords
        script: |
          printf '\nAPEX_STORE_PASSWORD=%s\n' "$CM_KEYSTORE_PASSWORD" >> android/gradle.properties
          printf 'APEX_KEY_PASSWORD=%s\n' "$CM_KEY_PASSWORD" >> android/gradle.properties

      - name: Decode keystore for signing
        script: |
          set -e
          echo -n "$CM_KEYSTORE" | tr -d ' \n\r' | base64 --decode > apex-upload.keystore
          ACTUAL=$(wc -c < apex-upload.keystore | tr -d ' ')
          echo "Keystore decoded: ${ACTUAL} bytes"
          echo "Keystore SHA-256: $(shasum -a 256 apex-upload.keystore | cut -d' ' -f1)"
          echo "CM_KEYSTORE var length: ${#CM_KEYSTORE} chars"
          echo "First 8 hex bytes: $(xxd -l 8 -p apex-upload.keystore)"
          if [ "$ACTUAL" -lt 2000 ]; then
            echo "ERROR: Keystore too small. Base64 decode likely failed."
            exit 1
          fi
          keytool -list -keystore apex-upload.keystore -storepass "$CM_KEYSTORE_PASSWORD" -alias "$CM_KEY_ALIAS" 2>&1 || {
            echo "ERROR: keytool cannot read keystore — file or password is incorrect."
            echo "Hint: re-encode locally with: base64 -i apex-upload.keystore | tr -d '\\n'"
            exit 1
          }

      - name: Build signed release APK
        script: |
          cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - mugaliamar@gmail.com
        notify:
          success: true
          failure: true
